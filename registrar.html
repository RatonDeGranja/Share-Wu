<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/estilo1.css">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico" >
    <title>Últimas actividades añadidas</title>
</head>
<body>
    <header>
        <a href="index.html"><img src="images/icon.png" alt="logo"></a>
        <h1>Share Wu</h1>
        <p>Comparte tus momentos con los demás</p>

        <nav id="nav_container">
            <label for="chkMenu">&#9776;</label>
            <input type="checkbox" id="chkMenu">
            <ul>
                <li><a href="index.html" class="icon-home">Inicio</a></li>
                <li><a href="buscar.html" class="icon-search">Buscar</a></li>  
                <li><a href="login.html" class="icon-login">Login </a></li>              
                <li><a href="index.html" class="icon-logout">Logout</a></li>                
                <li><a href="registrar.html" class="icon-regis">Crear una cuenta</a></li>                
                <li><a href="nueva.html" class="icon-new">Nueva</a></li>
            </ul>
            
        </nav>
    </header>

    

    <main>
        <form class="login_form">
            <div class="form_reg_div">
                <div>
                    <label for="usuario">Nombre de usuario:</label>
                    <input type="text" id="usuario" placeholder="Introduzca su nombre de usuario" autofocus required minlength="4" maxlength="20" pattern="^[a-zA-Z][a-zA-Z0-9]{3,19}$" title="El usuario debe tener entre 4 y 20 caracteres, contener solo letras y números, sin espacios, y no empezar por un número.">
                </div>
                <div>
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" placeholder="Introduzca su contraseña" pattern="^[a-zA-Z0-9_\-\.]+$" title="La contraseña no admite espacios. Solo se permiten letras, números, guiones (-), guiones bajos (_) y puntos (.)." required>
                </div>
                <div>
                    <input type="checkbox" id="mostrar1"> 
                    <label for="mostrar1">Mostrar Contraseña</label>
                </div>
                <div>
                    <label for="password2">Confirmar contraseña:</label>
                    <input type="password" id="password2" placeholder="Confirme su contraseña">
                </div>
                <div>
                    <input type="checkbox" id="mostrar2"> 
                    <label for="mostrar2">Mostrar Contraseña</label>
                </div>
                <div>
                    <label for="email">Email:</label>
                    <input type="text" id="email" placeholder="Introduzca su correo" required>
                </div>
                <div>
                    <div>
                        <label for="foto_usuario" >
                            <img src="images/no_photo.jpg" id="image_reg_button" alt="user_photo">
                        </label>
                        
                    </div>
                    <input type="file" id="foto_usuario" required>
                </div>
                <button>Eliminar imagen</button>
                <footer class="form_footer">
                    <div>
                        <input type="checkbox" id="recordar">
                        <label for="recordar">Recordar sesión durante 30 días</label>
                    </div>
                    <div>
                        <button type="submit">Login</button>
                        <button type="reset">Limpiar</button>
                    </div>
                    <a href="login.html">¿Ya tienes una cuenta? Inicia Sesión</a>
                    </footer>
            </div>
            
        </form>
    </main>

    <footer>
        <a href="about.html">Información de contacto</a>
        <p>&copy; Roberto De Iulii Sepulcre 04/02/2026</p>
    </footer>
    
</body>
</html>
